name: Complaint
description: Submit a formal complaint about product behavior or service quality
labels:
  - complaint
body:
  - type: markdown
    attributes:
      value: "Use this template for formal complaints. Avoid posting sensitive private information."
  - type: textarea
    id: concern
    attributes:
      label: Complaint Summary
      description: Describe your concern clearly
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How does this issue affect you?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or Context
      description: Include relevant context, steps, or references
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred Contact Method
      description: Provide a safe contact route if private follow-up is needed
      placeholder: GitHub username or email
    validations:
      required: true
