name: Bug Report
description: Report a reproducible problem with TypeFlow
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please provide enough detail to reproduce it."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered reproduction steps
      placeholder: "1. Go to ...\n2. Click ...\n3. See error"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: timestamp
    attributes:
      label: Date and Time (with timezone)
      placeholder: 2026-04-19 13:25 IST
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and Device
      placeholder: Chrome 135 / macOS 15
    validations:
      required: true
